<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAH Group — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #6c2bd9 0%, #8b3dff 40%, #7c3aed 70%, #6d28d9 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Floating bubbles background */
.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  animation: floatBubble linear infinite;
}
.bubble:nth-child(1) { width:80px;height:80px; left:10%; animation-duration:8s; animation-delay:0s; }
.bubble:nth-child(2) { width:120px;height:120px; left:20%; animation-duration:12s; animation-delay:-3s; }
.bubble:nth-child(3) { width:60px;height:60px; left:70%; animation-duration:9s; animation-delay:-6s; }
.bubble:nth-child(4) { width:150px;height:150px; left:80%; animation-duration:14s; animation-delay:-2s; }
.bubble:nth-child(5) { width:40px;height:40px; left:50%; animation-duration:7s; animation-delay:-4s; }

@keyframes floatBubble {
  0%   { transform: translateY(110vh) scale(0.8); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { transform: translateY(-10vh) scale(1.1); opacity:0; }
}

/* Main container */
.container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  width: 900px;
  max-width: 95vw;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.2);
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.35);
  animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
  min-height: 520px;
}

@keyframes cardIn {
  from { opacity:0; transform:scale(0.94) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

/* Left - Illustration side */
.left-side {
  flex: 1.2;
  padding: 50px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}

.company-brand {
  text-align: center;
  margin-bottom: 32px;
}
.company-brand .crown { font-size: 36px; margin-bottom: 8px; }
.company-brand h2 {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
  text-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.company-brand p {
  font-size: 11px;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
  margin-top: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* SVG Illustration */
.illustration {
  width: 100%;
  max-width: 320px;
}

/* Right - Form side */
.right-side {
  flex: 1;
  background: rgba(255,255,255,0.97);
  padding: 44px 36px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 520px;
}

.form-title {
  font-size: 26px;
  font-weight: 700;
  color: #2d1b69;
  margin-bottom: 6px;
}
.form-subtitle {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 30px;
}

/* Input groups */
.input-group {
  margin-bottom: 18px;
}
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 7px;
}
.input-box {
  position: relative;
}
.input-box svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: #b0b7c3;
  pointer-events: none;
  transition: color 0.2s;
}
.input-box input {
  width: 100%;
  padding: 12px 14px 12px 40px;
  background: #f3f0ff;
  border: 1.5px solid #e5e0ff;
  border-radius: 10px;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  color: #2d1b69;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.input-box input:focus {
  border-color: #7c3aed;
  background: #faf8ff;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
}
.input-box input::placeholder { color: #bbb; }
.input-box input:focus + svg { color: #7c3aed; }

.eye-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; padding: 4px;
  color: #b0b7c3;
  transition: color 0.2s;
  font-size: 15px;
}
.eye-btn:hover { color: #7c3aed; }

/* Remember row */
.bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.remember {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: #6b7280;
  cursor: pointer;
  user-select: none;
}
.remember input {
  width: 15px; height: 15px;
  accent-color: #f59e0b;
  cursor: pointer;
}

/* Login button */
.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #f59e0b, #f97316);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(245,158,11,0.4);
  transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
  position: relative;
}
.btn-login:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(245,158,11,0.5);
}
.btn-login:active:not(:disabled) { transform: translateY(0); }
.btn-login:disabled { opacity: 0.65; cursor: not-allowed; }
.btn-login .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
.btn-login.loading .btn-text { display: none; }
.btn-login.loading .spinner  { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Alert */
.alert {
  display: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 500;
  margin-bottom: 16px;
  gap: 8px;
  align-items: center;
}
.alert.error   { display:flex; background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
.alert.success { display:flex; background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; }

/* Role badges */
.roles-section {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1.5px dashed #e5e7eb;
}
.roles-label {
  font-size: 11px;
  color: #9ca3af;
  text-align: center;
  margin-bottom: 12px;
  font-weight: 500;
}
.roles-grid {
  display: flex;
  gap: 8px;
}
.role-pill {
  flex: 1;
  text-align: center;
  padding: 9px 6px;
  border-radius: 10px;
  border: 1.5px solid #e5e0ff;
  background: #faf8ff;
  cursor: pointer;
  transition: all 0.2s;
}
.role-pill:hover {
  border-color: #7c3aed;
  background: #f3f0ff;
  transform: translateY(-1px);
}
.role-pill .rp-icon { font-size: 18px; }
.role-pill .rp-name { font-size: 11px; font-weight: 600; color: #4c1d95; margin-top: 3px; }
.role-pill .rp-id   { font-size: 10px; color: #b0b7c3; margin-top: 1px; }

/* Responsive */
@media (max-width: 680px) {
  .left-side { display: none; }
  .container { width: 95vw; }
  .right-side { padding: 36px 24px; min-height: auto; border-radius: 28px; }
}
</style>
</head>
<body>

<!-- Background bubbles -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

  <!-- LEFT: Brand + Illustration -->
  <div class="left-side">
    <div class="company-brand">
      <div class="crown">👑</div>
      <h2>SHAH Group</h2>
      <p>Of Business Management</p>
    </div>

    <!-- SVG Illustration — office worker at desk -->
    <svg class="illustration" viewBox="0 0 340 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Desk -->
      <rect x="40" y="190" width="260" height="12" rx="4" fill="rgba(255,255,255,0.25)"/>
      <rect x="70" y="200" width="14" height="50" rx="4" fill="rgba(255,255,255,0.18)"/>
      <rect x="256" y="200" width="14" height="50" rx="4" fill="rgba(255,255,255,0.18)"/>

      <!-- Monitor stand -->
      <rect x="155" y="168" width="10" height="24" rx="3" fill="rgba(255,255,255,0.3)"/>
      <rect x="140" y="188" width="40" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>

      <!-- Monitor -->
      <rect x="100" y="100" width="120" height="70" rx="8" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
      <rect x="108" y="108" width="104" height="54" rx="5" fill="rgba(255,255,255,0.15)"/>
      <!-- Screen lines -->
      <rect x="116" y="116" width="60" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
      <rect x="116" y="126" width="88" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="116" y="135" width="70" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
      <rect x="116" y="144" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>

      <!-- Keyboard -->
      <rect x="120" y="192" width="80" height="12" rx="4" fill="rgba(255,255,255,0.22)"/>

      <!-- Chair -->
      <rect x="148" y="210" width="44" height="30" rx="6" fill="rgba(255,255,255,0.18)"/>
      <rect x="156" y="238" width="10" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>
      <rect x="174" y="238" width="10" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>

      <!-- Person body -->
      <ellipse cx="170" cy="175" rx="18" ry="22" fill="rgba(255,255,255,0.28)"/>
      <!-- Person head -->
      <circle cx="170" cy="148" r="16" fill="rgba(255,255,255,0.35)"/>
      <!-- Person hair -->
      <ellipse cx="170" cy="137" rx="14" ry="7" fill="rgba(255,255,255,0.5)"/>
      <!-- Arms -->
      <path d="M155 178 Q135 182 128 188" stroke="rgba(255,255,255,0.35)" stroke-width="8" stroke-linecap="round"/>
      <path d="M185 178 Q205 182 212 188" stroke="rgba(255,255,255,0.35)" stroke-width="8" stroke-linecap="round"/>

      <!-- Plant -->
      <rect x="56" y="172" width="12" height="20" rx="3" fill="rgba(255,255,255,0.2)"/>
      <circle cx="62" cy="165" r="14" fill="rgba(255,255,255,0.2)"/>
      <circle cx="52" cy="170" r="10" fill="rgba(255,255,255,0.18)"/>
      <circle cx="72" cy="168" r="10" fill="rgba(255,255,255,0.18)"/>

      <!-- Floating elements -->
      <circle cx="280" cy="80" r="8" fill="rgba(245,158,11,0.6)" opacity="0.8">
        <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite"/>
      </circle>
      <rect x="40" y="70" width="12" height="12" rx="3" fill="rgba(255,255,255,0.3)" opacity="0.7">
        <animate attributeName="y" values="70;60;70" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="300" cy="150" r="5" fill="rgba(255,255,255,0.4)" opacity="0.6">
        <animate attributeName="cy" values="150;140;150" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </svg>

    <p style="color:rgba(255,255,255,0.5); font-size:11px; margin-top:16px; text-align:center;">
      Aapka business, hamare haath mein mehfooz hai
    </p>
  </div>

  <!-- RIGHT: Login Form -->
  <div class="right-side">
    <div class="form-title">Login</div>
    <div class="form-subtitle">Apne account mein login karen</div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- Username -->
    <div class="input-group">
      <label>Username</label>
      <div class="input-box">
        <input type="text" id="username" placeholder="Username likhein" autocomplete="username"/>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label>Password</label>
      <div class="input-box">
        <input type="password" id="password" placeholder="Password likhein" autocomplete="current-password"/>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button class="eye-btn" type="button" onclick="togglePass()" id="eyeBtn">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Remember -->
    <div class="bottom-row">
      <label class="remember">
        <input type="checkbox" id="remember"/>
        Remember me
      </label>
    </div>

    <!-- Button -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">LOGIN</span>
      <div class="spinner"></div>
    </button>

    <!-- Role quick select -->
    <div class="roles-section">
      <div class="roles-label">Quick login — role click karen</div>
      <div class="roles-grid">
        <div class="role-pill" onclick="fillCreds('admin','admin123')">
          <div class="rp-icon">👑</div>
          <div class="rp-name">Admin</div>
          <div class="rp-id">admin</div>
        </div>
        <div class="role-pill" onclick="fillCreds('cashier','cash123')">
          <div class="rp-icon">💼</div>
          <div class="rp-name">Cashier</div>
          <div class="rp-id">cashier</div>
        </div>
        <div class="role-pill" onclick="fillCreds('viewer','view123')">
          <div class="rp-icon">👁️</div>
          <div class="rp-name">Viewer</div>
          <div class="rp-id">viewer</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyG4sce-iVMvxekaMy1acoSImgVB8--GEEGiU18z_5UrNNivs6jHLDpNiSMUvtfebYQAw/exec";

  // Check already logged in
  window.addEventListener('load', function() {
    if (sessionStorage.getItem('bms_user')) {
      window.location.href = 'dashboard.html';
    }
    const saved = localStorage.getItem('bms_remember');
    if (saved) {
      try {
        const d = JSON.parse(saved);
        document.getElementById('username').value = d.u || '';
        document.getElementById('password').value = d.p || '';
        document.getElementById('remember').checked = true;
      } catch(e) {}
    }
  });

  // Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function togglePass() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function fillCreds(u, p) {
    document.getElementById('username').value = u;
    document.getElementById('password').value = p;
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.className = 'alert ' + type;
    el.innerHTML = (type==='error'?'⚠️ ':'✅ ') + msg;
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const remember = document.getElementById('remember').checked;
    const btn = document.getElementById('loginBtn');

    document.getElementById('alert').className = 'alert';

    if (!username) { showAlert('Username likhein', 'error'); return; }
    if (!password) { showAlert('Password likhein', 'error'); return; }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'login', username, password })
      });
      const data = await res.json();

      if (data.success) {
        if (remember) {
          localStorage.setItem('bms_remember', JSON.stringify({u:username, p:password}));
        } else {
          localStorage.removeItem('bms_remember');
        }
        sessionStorage.setItem('bms_user', JSON.stringify(data.user));
        showAlert('Login ho gaya! Dashboard khul raha hai...', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      } else {
        showAlert(data.error || 'Username ya password galat hai', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    } catch(err) {
      showAlert('Network error — internet check karen', 'error');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
